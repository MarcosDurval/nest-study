# Sink: publish outbox events to the existing RabbitMQ exchange.
debezium.sink.type=rabbitmq
debezium.sink.rabbitmq.connection.host=rabbitmq
debezium.sink.rabbitmq.connection.port=5672
debezium.sink.rabbitmq.connection.username=${RABBITMQ_DEFAULT_USER}
debezium.sink.rabbitmq.connection.password=${RABBITMQ_DEFAULT_PASS}
debezium.sink.rabbitmq.exchange=${RABBITMQ_CUSTOMERS_EXCHANGE}
debezium.sink.rabbitmq.routingKey=${RABBITMQ_CUSTOMER_CREATED_ROUTING_KEY}
debezium.sink.rabbitmq.routingKey.source=static
debezium.sink.rabbitmq.deliveryMode=2

# Source: PostgreSQL logical decoding over the transactional outbox table.
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.plugin.name=pgoutput
debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=${POSTGRES_USER}
debezium.source.database.password=${POSTGRES_PASSWORD}
debezium.source.database.dbname=${POSTGRES_DB}
debezium.source.topic.prefix=customers
debezium.source.table.include.list=public.outbox_events
debezium.source.publication.autocreate.mode=filtered
debezium.source.slot.name=customers_outbox_cdc
debezium.source.snapshot.mode=no_data
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=1000

# Emit the outbox payload as schemaless JSON.
debezium.format.key=json
debezium.format.value=json
debezium.format.value.schemas.enable=false

# Transform the database outbox row into the integration event payload.
debezium.transforms=outbox
debezium.transforms.outbox.type=io.debezium.transforms.outbox.EventRouter
debezium.transforms.outbox.table.field.event.id=id
debezium.transforms.outbox.table.field.event.key=aggregate_id
debezium.transforms.outbox.table.field.event.payload=payload
debezium.transforms.outbox.route.by.field=event_type
debezium.transforms.outbox.route.topic.replacement=${routedByValue}
debezium.transforms.outbox.table.expand.json.payload=true
