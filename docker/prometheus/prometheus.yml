global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:3000"]

  - job_name: "email-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["email-service:3001"]

  - job_name: "rabbitmq"
    metrics_path: "/metrics/per-object"
    static_configs:
      - targets: ["rabbitmq:15692"]
